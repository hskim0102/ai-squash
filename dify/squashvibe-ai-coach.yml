app:
  description: 스쿼시 경기 영상을 Gemini AI로 분석하고 맞춤 피드백과 훈련 루틴을 제공합니다
  icon: "\U0001F3BE"
  icon_background: '#D4FF00'
  mode: chat
  name: SquashVibe AI Coach
  use_icon_as_answer_icon: false
kind: app
model_config:
  agent_mode:
    enabled: false
    max_iteration: 5
    strategy: function_call
    tools: []
  annotation_reply:
    enabled: false
  chat_prompt_config: {}
  completion_prompt_config: {}
  context:
    enabled: false
    variable: ''
  dataset_configs:
    datasets:
      datasets: []
    retrieval_model: single
  dataset_query_variable: ''
  file_upload:
    allowed_file_extensions:
    - .mp4
    - .mov
    - .avi
    - .webm
    allowed_file_types:
    - video
    allowed_file_upload_methods:
    - local_file
    enabled: true
    number_limits: 1
    image:
      enabled: false
      number_limit: 3
      transfer_methods:
      - remote_url
      - local_file
  more_like_this:
    enabled: false
  model:
    completion_params:
      temperature: 0.7
      max_tokens: 2048
    mode: chat
    name: gemini-3-flash-preview
    provider: google
  opening_statement: "안녕하세요! 스쿼시 AI 코치입니다 \U0001F3BE\n경기 영상을 업로드하고 경기 정보를 알려주시면\
    \ 분석해드릴게요!"
  pre_prompt: "당신은 친근하고 열정적인 스쿼시 트레이너입니다. 한국어로 답변하세요.\n사용자가 스쿼시 경기 영상과 경기 정보를 제공하면\
    \ 영상을 분석하고 아래 JSON 형식으로만 응답하세요.\n다른 텍스트는 포함하지 마세요. 순수 JSON만 출력하세요.\n\n출력 형식:\n{\n\
    \  \"praise\": [\"칭찬할 점 1\", \"칭찬할 점 2\"],\n  \"improvements\": [\n    { \"timestamp\"\
    : \"00:15\", \"message\": \"개선할 점과 격려 메시지\" }\n  ],\n  \"drills\": [\n    {\n  \
    \    \"name\": \"드릴 이름\",\n      \"duration\": \"10분\",\n      \"difficulty\": \"\
    보통\",\n      \"description\": \"드릴 설명 2~3줄\"\n    }\n  ],\n  \"skills\": {\n    \"\
    accuracy\": 70,\n    \"power\": 65,\n    \"activity\": 80\n  }\n}\n\n규칙:\n- praise:\
    \ 2~3개, 격려하는 말투로\n- improvements: 2~4개, 타임스탬프 \"MM:SS\" 형식, \"거의 다 됐어요\", \"조금만\
    \ 더\" 같은 응원 포함\n- drills: 3~5개, 영상에서 발견된 약점을 보완하는 훈련\n- difficulty: 반드시 \"쉬움\",\
    \ \"보통\", \"어려움\" 중 하나\n- skills: 0~100 사이 정수, 영상에서 관찰된 수준 평가"
  prompt_type: simple
  retriever_as_tool: false
  sensitive_word_avoidance:
    configs: []
    enabled: false
    type: ''
  speech_to_text:
    enabled: false
  suggested_questions:
  - "\U0001F3A5 경기 영상 분석해줘"
  - "\U0001F4CB 오늘 훈련 루틴 추천해줘"
  suggested_questions_after_answer:
    enabled: false
  text_to_speech:
    enabled: false
    language: ''
    voice: ''
  user_input_form: []
version: 0.1.3
